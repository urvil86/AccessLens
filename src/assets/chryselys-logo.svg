  <text x="100" y="195" text-anchor="middle" font-family="Roboto Slab, Georgia, serif" font-weight="700" font-size="22" fill="#004567" letter-spacing="3">CHRYSELYS</text>
  <!-- Tagline -->
  <text x="100" y="213" text-anchor="middle" font-family="Roboto Slab, Georgia, serif" font-weight="400" font-size="9" fill="#9296B2" letter-spacing="1">Data Impacts Lives</text>
