    <circle cx="55" cy="146" r="2" fill="#004567"/>
    <!-- Mixed dots (top/bottom) -->
    <circle cx="80" cy="28" r="2" fill="#9296B2"/>
    <circle cx="100" cy="25" r="2.5" fill="#9296B2"/>
    <circle cx="120" cy="28" r="2" fill="#9296B2"/>
    <circle cx="80" cy="158" r="2" fill="#9296B2"/>
